<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>跨境客服 Agent MVP 聊天演示</title>
    <style>
      body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif; background:#f5f7fb; margin:0; }
      .container { max-width: 760px; margin: 24px auto; background: #fff; border:1px solid #e5e7eb; border-radius: 12px; overflow: hidden; }
      .header { padding: 14px 16px; font-weight: 700; background:#111827; color:#fff; }
      .messages { height: 460px; overflow-y:auto; padding: 16px; display:flex; flex-direction:column; gap: 12px; }
      .msg { padding: 10px 12px; border-radius: 10px; max-width: 88%; line-height:1.5; font-size: 14px; }
      .user { align-self:flex-end; background:#2563eb; color:#fff; }
      .bot { align-self:flex-start; background:#f3f4f6; color:#111827; border:1px solid #e5e7eb; }
      .meta { margin-top: 6px; font-size: 12px; color:#4b5563; }
      .composer { display:flex; gap: 8px; padding: 12px; border-top:1px solid #e5e7eb; }
      #input { flex:1; padding: 10px 12px; border:1px solid #d1d5db; border-radius: 8px; font-size: 14px; }
      #send { background:#111827; color:#fff; border:0; border-radius: 8px; padding: 0 16px; cursor:pointer; }
      #send:disabled { opacity: .6; cursor: not-allowed; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">跨境个护健康品类 AI 客服 Agent（MVP）</div>
      <div id="messages" class="messages">
        <div class="msg bot">您好，我是客服助手。您可以问我商品、订单、清关、物流、售后或导购问题。</div>
      </div>
      <div class="composer">
        <input id="input" placeholder="请输入问题，例如：订单号ORD1001清关到哪一步了？" />
        <button id="send">发送</button>
      </div>
    </div>

    <script>
      const messagesEl = document.getElementById('messages');
      const inputEl = document.getElementById('input');
      const sendBtn = document.getElementById('send');

      function appendMessage(text, role, meta) {
        const item = document.createElement('div');
        item.className = `msg ${role}`;
        item.textContent = text;

        if (meta && role === 'bot') {
          const metaEl = document.createElement('div');
          metaEl.className = 'meta';
          const tools = Array.isArray(meta.usedTools) ? meta.usedTools.join(', ') : '';
          metaEl.textContent = `intent: ${meta.intent || '-'} | usedTools: ${tools || '-'} | confidence: ${meta.confidence ?? '-'}`;
          item.appendChild(metaEl);
        }

        messagesEl.appendChild(item);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      async function sendMessage() {
        const message = inputEl.value.trim();
        if (!message) return;

        appendMessage(message, 'user');
        inputEl.value = '';
        sendBtn.disabled = true;

        try {
          const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message })
          });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const data = await response.json();
          appendMessage(data.answer || '抱歉，暂时无法处理。', 'bot', data);
        } catch (err) {
          appendMessage('请求失败，请稍后重试。', 'bot');
        } finally {
          sendBtn.disabled = false;
          inputEl.focus();
        }
      }

      sendBtn.addEventListener('click', sendMessage);
      inputEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') sendMessage();
      });
    </script>
  </body>
</html>
